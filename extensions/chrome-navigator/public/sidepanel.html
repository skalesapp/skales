<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skales Docs Navigator</title>
  <style>
    :root {
      --primary: #000000;
      --secondary: #4a5568;
      --bg: #f7fafc;
      --border: #e2e8f0;
      --text: #1a202c;
      --blue: #3182ce;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background-color: var(--bg);
      color: var(--text);
    }
    .header {
      font-size: 1.25rem;
      font-weight: bold;
      margin-bottom: 16px;
      color: var(--primary);
    }
    .search-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 0.875rem;
      box-sizing: border-box;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 1px var(--blue);
    }
    .results {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .result-item {
      padding: 12px;
      border: 1px solid var(--border);
      background: white;
      border-radius: 4px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .result-item:hover {
      border-color: var(--secondary);
    }
    .result-title {
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 0.875rem;
    }
    .result-snippet {
      font-size: 0.75rem;
      color: var(--secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .saved-items-header {
      font-size: 1rem;
      font-weight: bold;
      margin: 24px 0 12px 0;
      color: var(--primary);
    }
    #saved-snippets {
      font-family: monospace;
      font-size: 0.75rem;
    }
    .snippet-item {
      background: #edf2f7;
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 8px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div class="header">Skales Navigator</div>
  
  <input type="text" id="search-input" class="search-input" placeholder="Search docs..." />
  
  <ul id="search-results" class="results">
    <!-- Results will be populated here -->
  </ul>

  <div class="saved-items-header">Saved Snippets</div>
  <div id="saved-snippets">
    <!-- Saved snippets will be populated here -->
  </div>

  <script src="../src/sidepanel.js"></script>
</body>
</html>
